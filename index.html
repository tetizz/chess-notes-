<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #161512;
  --bg2:      #1e1c1a;
  --bg3:      #272522;
  --bg4:      #302e2b;
  --border:   #3a3836;
  --border2:  #4a4846;
  --text:     #bababa;
  --text2:    #d8d8d8;
  --muted:    #6e6e6e;
  --muted2:   #505050;
  --accent:   #988CAD;
  --accent2:  #8a9bb5;
  --light-sq: #697281;
  --dark-sq:  #4f5661;
  --sq:       56px;
  --blunder:  #ca3431;
  --mistake:  #df8533;
  --inaccuracy:#d4a820;
  --good:     #988CAD;
  --brilliant:#8a9bb5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* Header */
header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 16px; height: 50px; display: flex; align-items: center; gap: 12px; }
.site-title { font-size: 16px; font-weight: 600; color: var(--text2); white-space: nowrap; }
.site-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Layout */
.app { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 50px); }

/* Sidebar */
nav { background: var(--bg2); border-right: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; height: calc(100vh - 50px); overflow-y: auto; }
.nav-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); padding: 0 16px; margin-bottom: 6px; display: block; }
.nav-item { display: block; padding: 8px 16px; font-size: 13px; color: var(--muted); cursor: pointer; border: none; border-left: 2px solid transparent; background: none; width: 100%; text-align: left; transition: color .12s, background .12s; line-height: 1.4; }
.nav-item:hover { color: var(--text2); background: var(--bg3); }
.nav-item.active { color: var(--text2); background: var(--bg3); border-left-color: var(--accent); }
.nav-tag { display: inline-block; font-size: 9px; background: var(--bg4); border: 1px solid var(--border2); border-radius: 2px; padding: 1px 4px; margin-left: 5px; vertical-align: middle; color: var(--muted); }

/* Main */
main { padding: 32px 40px; max-width: 920px; }

/* Entry */
.entry { margin-bottom: 56px; scroll-margin-top: 24px; }
.entry-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.entry-eyebrow { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 5px; }
.entry-title { font-size: 20px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.entry-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--muted); }
.tag { padding: 2px 7px; border: 1px solid var(--border2); border-radius: 2px; font-size: 10px; color: var(--muted); background: var(--bg3); }
.tag.opening { border-color: rgba(152,140,173,.4); color: var(--accent); }
.tag.tactics { border-color: rgba(202,52,49,.4); color: #e06c6c; }
.tag.endgame { border-color: rgba(111,168,220,.4); color: var(--accent2); }

/* Blocks */
.block { margin-bottom: 24px; }
.block-text { font-size: 14px; line-height: 1.85; color: var(--text); max-width: 640px; }
.block-games { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; max-width: 520px; }
.block-games-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.game-link { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); font-size: 13px; transition: color .12s; }
.game-link:last-child { border-bottom: none; }
.game-link:hover { color: var(--accent2); }
.game-link::before { content: '♟'; font-size: 10px; color: var(--muted); flex-shrink: 0; }

/* Line block */
.block-line { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
.block-line-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.block-line-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.pop-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.pop-bar { width: 72px; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.pop-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.pop-pct { font-size: 11px; color: var(--accent); min-width: 28px; text-align: right; }
.block-line-body { padding: 16px; background: var(--bg); }

/* Study layout */
.study-layout { display: flex; gap: 20px; align-items: flex-start; }

/* Board */
.board-wrap { flex-shrink: 0; }
.board-coords { display: grid; grid-template-columns: 16px calc(var(--sq) * 8); grid-template-rows: calc(var(--sq) * 8) 16px; }
.rank-labels { display: flex; flex-direction: column; justify-content: space-around; padding-right: 2px; }
.rank-labels span, .file-labels span { font-size: 9px; color: var(--muted2); font-family: monospace; text-align: center; }
.file-labels { display: flex; justify-content: space-around; grid-column: 2; padding-top: 3px; }
.board-grid { display: grid; grid-template-columns: repeat(8, var(--sq)); grid-template-rows: repeat(8, var(--sq)); width: calc(var(--sq) * 8); height: calc(var(--sq) * 8); }
.sq { width: var(--sq); height: var(--sq); display: flex; align-items: center; justify-content: center; position: relative; user-select: none; cursor: pointer; }
.sq.light { background: var(--light-sq); }
.sq.dark  { background: var(--dark-sq); }
.sq.hl-from, .sq.hl-to { }
.piece { pointer-events: none; display: flex; align-items: center; justify-content: center; }
.board-arrow-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }

/* Move panel */
.move-panel { flex: 1; min-width: 0; }
.move-nav { display: flex; gap: 0; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px; margin-bottom: 10px; }
.mv-btn { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 5px 12px; border-radius: 3px; transition: color .1s, background .1s; line-height: 1; }
.mv-btn:hover { color: var(--text2); background: var(--bg4); }
.mv-ctr { font-size: 11px; color: var(--muted); font-family: monospace; margin-left: auto; padding-right: 4px; }
.move-list-inner { display: flex; flex-direction: column; gap: 0; max-height: 300px; overflow-y: auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 4px; }
.mp { display: flex; align-items: center; }
.mn { font-size: 11px; color: var(--muted2); font-family: monospace; min-width: 28px; text-align: right; padding-right: 4px; flex-shrink: 0; }
.mb { background: transparent; border: none; color: var(--text); font-family: monospace; font-size: 13px; padding: 4px 8px; cursor: pointer; border-radius: 3px; min-width: 64px; text-align: left; transition: background .1s; display: flex; align-items: center; gap: 3px; }
.mb:hover { background: var(--bg4); }
.mb.active { background: var(--bg4); color: #fff; }
.ann { font-size: 11px; font-weight: 700; }
.ann-blunder    { color: var(--blunder); }
.ann-mistake    { color: var(--mistake); }
.ann-inaccuracy { color: var(--inaccuracy); }
.ann-good       { color: var(--good); }
.ann-brilliant  { color: var(--brilliant); }

/* Comment */
.comment-box { margin-top: 10px; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--accent2); border-radius: 0 3px 3px 0; font-size: 13px; line-height: 1.7; color: var(--text); min-height: 48px; }
.comment-box.empty { color: var(--muted2); font-size: 12px; }

.entry-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 56px; }
.empty-state { text-align: center; padding: 80px; color: var(--muted); }
.empty-state .big { font-size: 48px; margin-bottom: 16px; }

footer { border-top: 1px solid var(--border); background: var(--bg2); padding: 12px 24px; font-size: 11px; color: var(--muted2); display: flex; justify-content: space-between; }

/* ── Mobile ── */
@media (max-width: 768px) {
  :root { --sq: 42px; }

  .site-sub { display: none; }

  /* collapse sidebar into top nav */
  .app { grid-template-columns: 1fr; }
  nav {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    overflow-x: auto;
    overflow-y: visible;
  }
  .nav-label { display: none; }
  .nav-item {
    width: auto;
    border-left: none;
    border-bottom: 2px solid transparent;
    padding: 6px 10px;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-item.active {
    border-left: none;
    border-bottom-color: var(--accent);
  }

  main { padding: 16px; }
  .entry-title { font-size: 17px; }
  .block-text { font-size: 13px; max-width: 100%; }
  .block-games { max-width: 100%; }

  /* stack board and moves vertically on mobile */
  .study-layout { flex-direction: column; gap: 12px; }
  .board-wrap { width: 100%; }
  .board-coords {
    grid-template-columns: 14px calc(var(--sq) * 8);
    grid-template-rows: calc(var(--sq) * 8) 14px;
  }

  .move-list-inner { max-height: 200px; }
  .mv-btn { padding: 6px 10px; font-size: 14px; }
}

@media (max-width: 400px) {
  :root { --sq: 36px; }
}
</style>
</head>

// ── Annotation detection ──────────────────────────────────────────────────
function getAnnotation(comment) {
  if (!comment) return null;
  if (comment.startsWith('??') || comment.includes('CRITICAL BLUNDER') || comment.toLowerCase().includes('blunder')) return { symbol: '??', cls: 'ann-blunder' };
  if (comment.startsWith('?!') || comment.includes('Inaccuracy') || comment.includes('inaccuracy')) return { symbol: '?!', cls: 'ann-inaccuracy' };
  if (comment.startsWith('?') && !comment.startsWith('?!')) return { symbol: '?', cls: 'ann-mistake' };
  if (comment.startsWith('!!')) return { symbol: '!!', cls: 'ann-brilliant' };
  if (comment.startsWith('!') && !comment.startsWith('!!')) return { symbol: '!', cls: 'ann-good' };
  return null;
}

  wR:`<img src="${BASE}wR.svg" width="50" height="50">`, wB:`<img src="${BASE}wB.svg" width="50" height="50">`,
  wN:`<img src="${BASE}wN.svg" width="50" height="50">`, wP:`<img src="${BASE}wP.svg" width="50" height="50">`,
  bK:`<img src="${BASE}bK.svg" width="50" height="50">`, bQ:`<img src="${BASE}bQ.svg" width="50" height="50">`,

// ── Chess engine ──────────────────────────────────────────────────────────
const START_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

function getSqPx() {
  return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sq')) || 56;
}

function fenToBoard(fen) {
  return fen.split(' ')[0].split('/').map(row => {
    const rank = [];
    for (const ch of row) {
      if ('12345678'.includes(ch)) for (let i=0;i<+ch;i++) rank.push(null);
      else rank.push((ch===ch.toUpperCase()?'w':'b')+ch.toUpperCase());
    }
    return rank;
  });
}

function applyMove(board, san, turn) {
  const b = board.map(r=>[...r]);
  let s = san.replace(/[+#!?]/g,'');
  if (s==='O-O'||s==='0-0') { const rk=turn==='w'?7:0; b[rk][4]=null;b[rk][7]=null;b[rk][6]=turn+'K';b[rk][5]=turn+'R'; return b; }
  if (s==='O-O-O'||s==='0-0-0') { const rk=turn==='w'?7:0; b[rk][4]=null;b[rk][0]=null;b[rk][2]=turn+'K';b[rk][3]=turn+'R'; return b; }
  let promo=null;
  if (s.includes('=')) { promo=turn+s.split('=')[1].toUpperCase(); s=s.split('=')[0]; }
  const isCap=s.includes('x'); s=s.replace('x','');
  const df=s.slice(-2,-1).charCodeAt(0)-97, dr=8-parseInt(s.slice(-1));
  const pc=s[0]===s[0].toUpperCase()&&!'abcdefgh'.includes(s[0])?s[0]:'P';
  const piece=turn+pc, hint=s.slice(pc==='P'?0:1,-2).replace('x','');
  let srcR=-1,srcF=-1;
  for(let r=0;r<8&&srcR===-1;r++) for(let f=0;f<8&&srcR===-1;f++) {
    if(b[r][f]!==piece) continue;
    if(hint){if(!isNaN(hint)){if(r!==8-parseInt(hint))continue}else{if(f!==hint.charCodeAt(0)-97)continue}}
    if(canReach(b,r,f,dr,df,piece,turn,isCap)){srcR=r;srcF=f;}
  }
  if(srcR===-1) return b;
  if(piece[1]==='P'&&isCap&&!b[dr][df]) b[turn==='w'?dr+1:dr-1][df]=null;
  b[dr][df]=promo||piece; b[srcR][srcF]=null;
  return b;
}

function canReach(board,r,f,dr,df,piece,turn,isCap) {
  const type=piece[1],dr_=dr-r,df_=df-f;
  if(type==='P'){const dir=turn==='w'?-1:1;if(!isCap){if(df_!==0)return false;if(dr_===dir&&!board[dr][df])return true;const sr=turn==='w'?6:1;if(r===sr&&dr_===2*dir&&!board[r+dir][f]&&!board[dr][df])return true;}else return dr_===dir&&Math.abs(df_)===1;return false;}
  if(type==='N')return(Math.abs(dr_)===2&&Math.abs(df_)===1)||(Math.abs(dr_)===1&&Math.abs(df_)===2);
  if(type==='K')return Math.abs(dr_)<=1&&Math.abs(df_)<=1;
  if(type==='R'){if(dr_!==0&&df_!==0)return false;return clearPath(board,r,f,dr,df);}
  if(type==='B'){if(Math.abs(dr_)!==Math.abs(df_))return false;return clearPath(board,r,f,dr,df);}
  if(type==='Q'){if(dr_!==0&&df_!==0&&Math.abs(dr_)!==Math.abs(df_))return false;return clearPath(board,r,f,dr,df);}
  return false;
}
function clearPath(board,r,f,dr,df){const sr=Math.sign(dr-r),sf=Math.sign(df-f);let cr=r+sr,cf=f+sf;while(cr!==dr||cf!==df){if(board[cr][cf])return false;cr+=sr;cf+=sf;}return true;}

// ── Arrow drawing on canvas ───────────────────────────────────────────────
function drawArrow(canvas, fromR, fromF, toR, toF) {
  const sq = getSqPx();
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (fromR < 0 || toR < 0 || (fromR === toR && fromF === toF)) return;

  const cx1 = (fromF + 0.5) * sq, cy1 = (fromR + 0.5) * sq;
  const cx2 = (toF   + 0.5) * sq, cy2 = (toR   + 0.5) * sq;
  const dx = cx2 - cx1, dy = cy2 - cy1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ux = dx/len, uy = dy/len;
  const px = -uy, py = ux;

  const headLen = sq * 0.38, headW = sq * 0.22, shaftW = sq * 0.14;
  const x1 = cx1 + ux * (sq * 0.35), y1 = cy1 + uy * (sq * 0.35);
  const x2 = cx2 - ux * headLen,     y2 = cy2 - uy * headLen;

  ctx.strokeStyle = '#988CAD';
  ctx.fillStyle   = '#988CAD';
  ctx.lineWidth   = shaftW;
  ctx.lineCap     = 'round';

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx2, cy2);
  ctx.lineTo(x2 + px * headW, y2 + py * headW);
  ctx.lineTo(x2 - px * headW, y2 - py * headW);
  ctx.closePath();
  ctx.fill();
}

// ── Render board ──────────────────────────────────────────────────────────
function renderBoard(grid, canvas, board, lastFrom, lastTo) {
  grid.innerHTML = '';
  for (let r=0;r<8;r++) for (let f=0;f<8;f++) {
    const sq=document.createElement('div');
    sq.className='sq '+((r+f)%2===0?'light':'dark');
    if(lastFrom&&r===lastFrom.r&&f===lastFrom.f) sq.classList.add('hl-from');
    if(lastTo  &&r===lastTo.r  &&f===lastTo.f)   sq.classList.add('hl-to');
    const p=board[r][f];
    if(p&&PIECE_SVG[p]){const w=document.createElement('div');w.className='piece';w.innerHTML=PIECE_SVG[p];sq.appendChild(w);}
    grid.appendChild(sq);
  }
  drawArrow(canvas, lastFrom ? lastFrom.r : -1, lastFrom ? lastFrom.f : -1,
                    lastTo   ? lastTo.r   : -1, lastTo   ? lastTo.f   : -1);
}

// ── Build line widget ─────────────────────────────────────────────────────
function buildLineWidget(moves) {
  const SQ_PX = getSqPx();
  const states=[{board:fenToBoard(START_FEN),from:null,to:null}];
  let cur=fenToBoard(START_FEN),turn='w';
  for(const mv of moves){
    const next=applyMove(cur,mv.san,turn);
    let fr=null,to_=null;
    const isCastle = mv.san.replace(/[+#]/g,'') === 'O-O' || mv.san.replace(/[+#]/g,'') === 'O-O-O'
                  || mv.san === '0-0' || mv.san === '0-0-0';
    if (isCastle) {
      // just track the king
      const kingR = turn==='w' ? 7 : 0;
      fr = {r: kingR, f: 4};
      to_ = {r: kingR, f: mv.san.includes('O-O-O')||mv.san.includes('0-0-0') ? 2 : 6};
    } else {
      for(let r=0;r<8;r++) for(let f=0;f<8;f++){
        if(cur[r][f] && cur[r][f][0]===turn && !next[r][f]) fr={r,f};
        if(cur[r][f] && cur[r][f][0]!==turn && next[r][f] && next[r][f][0]===turn) to_={r,f};
        if(!cur[r][f] && next[r][f] && next[r][f][0]===turn) to_={r,f};
      }
    }
    states.push({board:next,from:fr,to:to_});
    cur=next;turn=turn==='w'?'b':'w';
  }
  let ply=0;
  const layout=document.createElement('div'); layout.className='study-layout';

  // Board side
  const boardWrap=document.createElement('div'); boardWrap.className='board-wrap';
  const coords=document.createElement('div'); coords.className='board-coords';
  const rankLabels=document.createElement('div'); rankLabels.className='rank-labels';
  for(let r=8;r>=1;r--){const s=document.createElement('span');s.textContent=r;rankLabels.appendChild(s);}
  const gridWrap=document.createElement('div');
  gridWrap.style.cssText=`position:relative;width:${SQ_PX*8}px;height:${SQ_PX*8}px;`;
  const grid=document.createElement('div'); grid.className='board-grid';
  const arrowCanvas=document.createElement('canvas');
  arrowCanvas.className='board-arrow-layer';
  arrowCanvas.width=SQ_PX*8; arrowCanvas.height=SQ_PX*8;
  gridWrap.appendChild(grid); gridWrap.appendChild(arrowCanvas);
  const fileLabels=document.createElement('div'); fileLabels.className='file-labels';
  ['a','b','c','d','e','f','g','h'].forEach(l=>{const s=document.createElement('span');s.textContent=l;fileLabels.appendChild(s);});
  const corner=document.createElement('div');
  coords.appendChild(rankLabels); coords.appendChild(gridWrap); coords.appendChild(corner); coords.appendChild(fileLabels);
  boardWrap.appendChild(coords); layout.appendChild(boardWrap);

  // Panel side
  const panel=document.createElement('div'); panel.className='move-panel';
  const navRow=document.createElement('div'); navRow.className='move-nav';
  [['⟨⟨',0],['◀',1],['▶',2],['⟩⟩',3]].forEach(([lbl,i])=>{
    const btn=document.createElement('button'); btn.className='mv-btn'; btn.textContent=lbl;
    btn.addEventListener('click',()=>{if(i===0)goto(0);else if(i===1)goto(ply-1);else if(i===2)goto(ply+1);else goto(moves.length);});
    navRow.appendChild(btn);
  });
  const ctr=document.createElement('span'); ctr.className='mv-ctr'; navRow.appendChild(ctr);
  panel.appendChild(navRow);

  const ml=document.createElement('div'); ml.className='move-list-inner';
  for(let i=0;i<moves.length;i+=2){
    const pair=document.createElement('div'); pair.className='mp';
    const num=document.createElement('span'); num.className='mn'; num.textContent=(i/2+1)+'.'; pair.appendChild(num);
    [i,i+1].forEach(j=>{
      if(!moves[j])return;
      const ann=getAnnotation(moves[j].comment);
      const btn=document.createElement('button'); btn.className='mb'; btn.dataset.ply=j+1;
      const ss=document.createElement('span'); ss.textContent=moves[j].san; btn.appendChild(ss);
      if(ann){const as=document.createElement('span');as.className='ann '+ann.cls;as.textContent=ann.symbol;btn.appendChild(as);}
      btn.addEventListener('click',()=>goto(j+1));
      pair.appendChild(btn);
    });
    ml.appendChild(pair);
  }
  panel.appendChild(ml);

  const cmt=document.createElement('div'); cmt.className='comment-box empty'; panel.appendChild(cmt);
  layout.appendChild(panel);

  function goto(p){
    if(p<0)p=0;if(p>moves.length)p=moves.length; ply=p;
    const s=states[ply];
    renderBoard(grid,arrowCanvas,s.board,s.from,s.to);
    ctr.textContent=ply+' / '+moves.length;
    ml.querySelectorAll('.mb').forEach(b=>b.classList.toggle('active',+b.dataset.ply===ply));
    const active=ml.querySelector('.mb.active');
    if(active)active.scrollIntoView({block:'nearest',behavior:'smooth'});
    if(ply>0&&moves[ply-1].comment){cmt.textContent=moves[ply-1].comment;cmt.classList.remove('empty');}
    else if(ply===0){cmt.textContent='Navigate moves to see annotations.';cmt.classList.add('empty');}
    else{cmt.textContent='—';cmt.classList.add('empty');}
  }
  layout.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goto(ply-1);if(e.key==='ArrowRight')goto(ply+1);});
  goto(0);
  return layout;
}

// ── Build entry ───────────────────────────────────────────────────────────
function buildEntry(entry,idx){
  const wrap=document.createElement('div'); wrap.className='entry'; wrap.id=entry.id;
  const hdr=document.createElement('div'); hdr.className='entry-header';
  hdr.innerHTML=`<div class="entry-eyebrow">ENTRY ${String(idx+1).padStart(2,'0')}</div><div class="entry-title">${entry.title}</div><div class="entry-meta"><span>${entry.date}</span>${entry.tags.map(t=>`<span class="tag ${t}">${t}</span>`).join('')}</div>`;
  wrap.appendChild(hdr);

  const blocks=entry.blocks||(entry.moves?[{type:'line',label:'',popularity:'',moves:entry.moves}]:[]);
  for(const block of blocks){
    const el=document.createElement('div'); el.className='block';
    if(block.type==='text'){
      el.className+=' block-text'; el.textContent=block.content;
    } else if(block.type==='games'){
      el.className+=' block-games';
      const lbl=document.createElement('div');lbl.className='block-games-label';lbl.textContent=block.label||'Reference games';el.appendChild(lbl);
      for(const g of block.games){const a=document.createElement('a');a.className='game-link';a.href=g.url||'#';a.target='_blank';a.rel='noopener';a.innerHTML=`<span>${g.label}</span>`;el.appendChild(a);}
    } else if(block.type==='line'){
      el.className='block block-line';
      const hdrEl=document.createElement('div');hdrEl.className='block-line-header';
      const labelEl=document.createElement('span');labelEl.className='block-line-label';labelEl.textContent=block.label||'Line';hdrEl.appendChild(labelEl);
      if(block.popularity){const pct=parseInt(block.popularity);const pw=document.createElement('div');pw.className='pop-wrap';pw.innerHTML=`<div class="pop-bar"><div class="pop-fill" style="width:${pct}%"></div></div><span class="pop-pct">${block.popularity}</span>`;hdrEl.appendChild(pw);}
      el.appendChild(hdrEl);
      const body=document.createElement('div');body.className='block-line-body';body.appendChild(buildLineWidget(block.moves));el.appendChild(body);
    }
    wrap.appendChild(el);
  }
  return wrap;
}

    const btn=document.createElement('button');btn.className='nav-item';
    btn.innerHTML=line.title+(line.tags[0]?`<span class="nav-tag">${line.tags[0]}</span>`:'');
    btn.addEventListener('click',()=>{document.getElementById(line.id)?.scrollIntoView({behavior:'smooth'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));btn.classList.add('active');});
    nav.appendChild(btn);
    main.appendChild(buildEntry(line,i));
    if(i<LINES.length-1){const hr=document.createElement('hr');hr.className='entry-divider';main.appendChild(hr);}
  });
  document.querySelector('.nav-item')?.classList.add('active');
}
document.getElementById('entry-count').textContent=LINES.length+(LINES.length===1?' entry':' entries');
</script>
</body>
</html>
